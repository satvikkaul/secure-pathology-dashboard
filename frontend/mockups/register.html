<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Secure Pathology Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eceef0",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#35260c",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#d3e4fe",
                        "tertiary-fixed": "#fadfb8",
                        "on-primary-container": "#8590a6",
                        "primary-container": "#1e293b",
                        "on-background": "#191c1e",
                        "inverse-surface": "#2d3133",
                        "primary-fixed": "#d8e3fb",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e6e8ea",
                        "inverse-on-surface": "#eff1f3",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#bcc7de",
                        "surface-tint": "#545f73",
                        "surface": "#f7f9fb",
                        "surface-bright": "#f7f9fb",
                        "primary": "#091426",
                        "tertiary": "#1e1200",
                        "surface-variant": "#e0e3e5",
                        "tertiary-fixed-dim": "#ddc39d",
                        "secondary": "#505f76",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "on-surface-variant": "#45474c",
                        "outline-variant": "#c5c6cd",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-container": "#a38c6a",
                        "on-surface": "#191c1e",
                        "primary-fixed-dim": "#bcc7de",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3c475a",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-secondary-fixed": "#0b1c30",
                        "on-error-container": "#93000a",
                        "outline": "#75777d",
                        "secondary-container": "#d0e1fb",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed": "#271902",
                        "on-secondary-fixed-variant": "#38485d",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#564427",
                        "on-primary-fixed": "#111c2d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "48px",
                        "sm": "8px",
                        "gutter": "24px",
                        "lg": "24px",
                        "container-max": "1440px",
                        "xs": "4px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.04em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f8fafc; /* Neutral background Level 0 */
        }
        .soft-shadow {
            box-shadow: 0px 4px 20px rgba(30, 41, 59, 0.04);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="h-full flex items-center justify-center p-gutter">
<!-- Main Registration Container -->
<main class="w-full max-w-md bg-white rounded-lg soft-shadow border border-[#e2e8f0] p-lg md:p-xl">
<!-- Brand Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Pathology Core</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure Dashboard Registration</p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-md" method="POST">
<!-- Full Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none">
                        person
                    </span>
<input class="w-full bg-[#f1f5f9] border border-transparent rounded-lg pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none input-glow transition-all" id="fullName" name="fullName" placeholder="Dr. Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Professional Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none">
                        mail
                    </span>
<input class="w-full bg-[#f1f5f9] border border-transparent rounded-lg pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none input-glow transition-all" id="email" name="email" placeholder="researcher@institute.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none">
                        lock
                    </span>
<input class="w-full bg-[#f1f5f9] border border-transparent rounded-lg pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none input-glow transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Must be at least 12 characters, include a number and symbol.</p>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none">
                        lock_reset
                    </span>
<input class="w-full bg-[#f1f5f9] border border-transparent rounded-lg pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none input-glow transition-all" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-[#1e293b] hover:bg-primary text-white font-label-md text-label-md rounded-lg py-[12px] px-md transition-colors flex justify-center items-center gap-sm" type="submit">
                    Create Account
                    <span class="material-symbols-outlined" style="font-size: 18px;">
                        arrow_forward
                    </span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Return to Login</a>
</p>
</div>
</main>
<!-- Suppressed Nav Shells as per logic: Linear/Transactional intent -->
</body></html>
