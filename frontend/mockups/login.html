<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .soft-shadow {
            box-shadow: 0px 4px 20px rgba(30, 41, 59, 0.04);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

<body class="min-h-screen flex flex-col items-center justify-center p-gutter relative overflow-hidden antialiased">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container opacity-20 blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed opacity-20 blur-3xl"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-lg soft-shadow border border-outline-variant z-10 relative">
<!-- Brand Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Secure Pathology Dashboard</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">science</span>
                Research Prototype
            </p>
</div>
<!-- Form -->
<form class="space-y-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface font-body-md text-body-md input-glow outline-none transition-all duration-200" id="email" name="email" placeholder="researcher@lab.edu" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface font-body-md text-body-md input-glow outline-none transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Sign In
                </button>
</div>
</form>
<!-- Register Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Need an access credential? 
                <a class="font-label-md text-label-md text-primary hover:underline ml-1" href="#">Register for Trial</a>
</p>
</div>
</div>
<!-- Notice Footer -->
<div class="mt-xl text-center z-10">
<p class="font-label-sm text-label-sm text-error bg-error-container px-4 py-2 rounded-full inline-flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">warning</span>
            Not for Clinical Use
        </p>
</div>
